// ─── COMPUTE ─────────────────────────────────────────────
function computeTiles(player,sunPos,efx){
  efx=efx||{};
  const sun=SUN[sunPos%4];const v={};
  for(let t=1;t<=9;t++){let l=sun.core.includes(t)?2:sun.edge.includes(t)?1:0;if(efx.solarFlare)l=Math.min(3,l+1);v[t]={l,w:0};}
  player.grid.forEach(tile=>{
    if(tile.dmg>0||!tile.c||tile.c.t!=="hw")return;
    const{hwt}=tile.c.card,id=tile.id;
    if(hwt==="bIrrig"){v[id].w+=1;ortho(id).forEach(n=>v[n].w+=1);}
    else if(hwt==="uIrrig"){v[id].w+=1;all8(id).forEach(n=>v[n].w+=1);}
    else if(hwt==="bMirror"&&!efx.mirrorsDown){const tgt=adjDir(id,(tile.c.dirs||[])[0]);if(tgt)v[tgt].l=Math.min(3,v[tgt].l+1);}
    else if(hwt==="uMirror"&&!efx.mirrorsDown){(tile.c.dirs||[]).slice(0,2).forEach(d=>{const tgt=adjDir(id,d);if(tgt)v[tgt].l=Math.min(3,v[tgt].l+1);});}
    else if(hwt==="cReg"){v[id].l=Math.min(3,v[id].l+1);v[id].w+=1;all8(id).forEach(n=>{v[n].l=Math.min(3,v[n].l+1);v[n].w+=1;});}
  });
  if(player.colony.agriWater)v[player.colony.agriWater].w+=1;
  return v;
}

// ─── AI (computer-controlled player) ────────────────────────
// Heuristic, not a search/ML solver — deterministic and fast, tuned to be a genuinely
// tough opponent: hardware coverage maximization, greedy best-fit seed placement, and
// Vitality-aware ship-vs-invest that gets aggressive about investing whenever it's safe.
function aiPlaceMirror(card,player,grid,sunPos,efx){
  const max=card.hwt==="uMirror"?2:1;
  const dirs4=["up","right","down","left"];
  const emptyTiles=grid.filter(t=>!t.c&&t.dmg===0);
  if(!emptyTiles.length)return null;
  const tv=computeTiles({...player,grid},sunPos,efx);
  const need=id=>{
    const tile=grid.find(t=>t.id===id);
    const v=tv[id]||{l:0,w:0};
    let n=3-v.l;
    if(tile&&tile.c&&tile.c.t==="seed"&&v.l<tile.c.card.lr)n+=5;
    return n;
  };
  let best=null,bestScore=-1;
  for(const et of emptyTiles){
    const reachable=dirs4.map(d=>({d,tgt:adjDir(et.id,d)})).filter(x=>x.tgt!=null&&grid.find(g=>g.id===x.tgt&&g.dmg===0));
    if(!reachable.length)continue;
    const scored=reachable.map(r=>({...r,n:need(r.tgt)})).sort((a,b)=>b.n-a.n);
    const pick=scored.slice(0,max);
    const score=pick.reduce((s,p)=>s+p.n,0);
    if(score>bestScore){bestScore=score;best={tileId:et.id,dirs:pick.map(p=>p.d)};}
  }
  return best;
}
function aiPlanEngineering(player,sunPos,efx){
  const actions=[];
  let grid=player.grid.map(t=>({...t}));
  // Infrastructure only pays off if there's farmland left to use it on — cap hardware at
  // half the grid so the AI doesn't pave over every tile and starve itself of room to
  // actually plant seeds by round 3-4.
  const hwCap=Math.floor(grid.length/2);
  const hwCards=player.hand.filter(c=>c.t==="hw");
  for(const card of hwCards){
    if(grid.filter(t=>t.c&&t.c.t==="hw").length>=hwCap)break;
    const emptyTiles=grid.filter(t=>!t.c&&t.dmg===0);
    if(!emptyTiles.length)break;
    let spot=null;
    if(card.hwt==="bIrrig"||card.hwt==="uIrrig"||card.hwt==="cReg"){
      const covFn=card.hwt==="bIrrig"?ortho:all8;
      let best=null,bestScore=-1;
      for(const t of emptyTiles){
        const score=covFn(t.id).length+1;
        if(score>bestScore){bestScore=score;best=t;}
      }
      if(best)spot={tileId:best.id,dirs:[]};
    } else {
      spot=aiPlaceMirror(card,player,grid,sunPos,efx);
    }
    if(!spot)continue;
    grid=grid.map(t=>t.id===spot.tileId?{...t,c:{t:"hw",card,dirs:spot.dirs}}:t);
    actions.push({tileId:spot.tileId,card,dirs:spot.dirs});
  }
  const seedCards=player.hand.filter(c=>c.t==="seed").sort((a,b)=>b.yld-a.yld);
  for(const card of seedCards){
    const tv=computeTiles({...player,grid},sunPos,efx);
    const emptyTiles=grid.filter(t=>!t.c&&t.dmg===0);
    let best=null,bestOverkill=Infinity;
    for(const t of emptyTiles){
      const v=tv[t.id]||{l:0,w:0};
      if(v.l>=card.lr&&v.w>=card.wr){
        const overkill=(v.l-card.lr)+(v.w-card.wr);
        if(overkill<bestOverkill){bestOverkill=overkill;best=t;}
      }
    }
    if(best){
      grid=grid.map(t=>t.id===best.id?{...t,c:{t:"seed",card,dormant:0}}:t);
      actions.push({tileId:best.id,card,dirs:null});
    }
  }
  return actions;
}
// Reads the room before offering a trade: does the recipient's grid actually have space
// this would slot into right now, and do they even hold this crop/hardware type already
// (in hand or on the grid)? Higher score = more useful to THEM, not just "spare for us."
function aiTradeUsefulness(card,recipient,sunPos,efx){
  const emptyTiles=recipient.grid.filter(t=>!t.c&&t.dmg===0);
  if(!emptyTiles.length)return 0;
  if(card.t==="seed"){
    const tv=computeTiles(recipient,sunPos,efx);
    const fitsNow=emptyTiles.some(t=>{const v=tv[t.id]||{l:0,w:0};return v.l>=card.lr&&v.w>=card.wr;});
    if(fitsNow)return 2;
    const hasType=recipient.hand.some(c=>c.t==="seed"&&c.crop===card.crop);
    return hasType?0:1;
  }
  const hasType=recipient.grid.some(t=>t.c&&t.c.t==="hw"&&t.c.card.hwt===card.hwt)||recipient.hand.some(c=>c.t==="hw"&&c.hwt===card.hwt);
  return hasType?0:2;
}

  {id:"guardian",label:"Guardian",icon:"🌍",color:"#4ade80",desc:"Ships generously and puts Earth's survival first, even at its own expense."},
  {id:"balanced",label:"Balanced",icon:"⚖️",color:"#40d9c4",desc:"Ships a fair share and invests the rest — tough but not reckless."},

  {id:"wildcard",label:"Wildcard",icon:"🎲",color:"#ec4899",desc:"Mostly steady, but every so often throws the whole plan out and gambles."},
];

// You don't get to pick your opponent's temperament -- always randomized.

function aiContribution(player,round,vit,efx,playerCount,personality){
  const base=DEMAND[round]||{g:0,gr:0,ex:0};
  const dem={g:base.g+(efx.demG||0),gr:base.gr,ex:efx.demExDouble?base.ex*2:base.ex};
  // Personality sets how much of the burden the AI carries vs keeps for itself. Guardian
  // over-ships even at its own expense; Opportunist free-rides until Vitality is genuinely
  // at risk; Balanced ships a fair share throughout; Wildcard is Balanced except for the
  // occasional (~1-in-6 rounds) coin-flip into an all-in extreme — hoarding everything
  // (ships nothing, risking Earth) or dumping everything (its whole stockpile, sacrificing
  // its own colony growth that round).
  let want;
  if(personality==="wildcard"&&Math.random()<1/6){
    const hoard=Math.random()<0.5;
    want=hoard?{g:0,gr:0,ex:0}:{g:player.stockpile.g,gr:player.stockpile.gr,ex:player.stockpile.ex};
  }else{
    let shareMult;
    if(personality==="guardian")shareMult=vit>=7?1.5/playerCount:vit>=4?2/playerCount:1.5;
    else if(personality==="opportunist")shareMult=vit>=4?0:1/playerCount;
    else shareMult=vit>=7?1/playerCount:vit>=4?1.3/playerCount:1;
    want={g:Math.ceil(dem.g*shareMult),gr:Math.ceil(dem.gr*shareMult),ex:Math.ceil(dem.ex*shareMult)};
  }
  const ship={
    g:Math.min(want.g,player.stockpile.g),
    gr:Math.min(want.gr,player.stockpile.gr),
    ex:Math.min(want.ex,player.stockpile.ex),
  };
  const openLS=player.colony.ls.filter(x=>!x).length;
  const openAG=player.colony.ag.filter(x=>!x).length;
  const openRE=player.colony.re.filter(x=>!x).length;
  // Empty colony slots carry a DP penalty at game end, and stockpile scores nothing —
  // so invest every leftover crop it can fit rather than hoarding.
  const invest={
    g:Math.min(player.stockpile.g-ship.g,openLS),
    gr:Math.min(player.stockpile.gr-ship.gr,openAG),
    ex:Math.min(player.stockpile.ex-ship.ex,openRE),
  };
  return{ship,invest};
}
function calcDP(p,vit){
  const ls=p.colony.ls.filter(Boolean).length,ag=p.colony.ag.filter(Boolean).length,re=p.colony.re.filter(Boolean).length;
  let dp=ls*1-(6-ls)*2+ag*2-(4-ag)*2+re*4-(3-re)*3;
  if(ls>0&&ag>0&&re>0)dp+=5;
  dp+=(p.roundWins||0)*2;
  return Math.floor(dp*(vit>=7?1:vit>=4?0.5:0.25));
}

  };

const alog=(log,msg)=>[...log,msg].slice(-12);

// Start-of-round setup: rotate the sun, tick down meteor damage, draw + resolve the event.
// Runs every round including round 1 — not a player-triggered action.
function startRound(s){
  const sunPos=(s.round-1)%4;
  let players=s.players.map(p=>({...p,grid:p.grid.map(t=>({...t,dmg:Math.max(0,t.dmg-1)}))}));
  let log=alog(s.log,`R${s.round} ☀️ ${SUN[sunPos].label}`);
  return{...s,sunPos,players,log,phase:"event",event:null,efx:blankEfx(),meteorHit:null,
    eventDrawn:false,meteorResolved:false,harvestResults:null,shipResult:null};
}

// ─── REDUCER ─────────────────────────────────────────────
function reducer(s,a){
  switch(a.type){
  case"RESET":return{...startRound(makeState(a.names,a.aiFlags)),gameStarted:true};
  case"DRAW_EVENT":{
    if(s.eventDrawn)return s;
    const evDeck=[...s.evDeck];const event=evDeck.shift()||null;
    let efx=blankEfx();let log=s.log;let vit=s.vit;
    if(event){
      log=alog(log,`${event.icon} ${event.name}`);
      if(event.id==="e4")efx={...efx,demG:4};if(event.id==="e5")efx={...efx,demExDouble:true};
      if(event.id==="e6")efx={...efx,demG:2};if(event.id==="e7")efx={...efx,bumper:true};
      if(event.id==="e8")efx={...efx,extraCard:true,freeHW:true};if(event.id==="e10")efx={...efx,seedsOnly:true};
      if(event.id==="e11")efx={...efx,solarFlare:true,mirrorsDown:true};if(event.id==="e12")efx={...efx,embargo:true};
      if(event.id==="e13")vit=Math.max(0,vit-3);if(event.id==="e14")vit=Math.min(10,vit+2);
    }
    if(vit<=0)return{...s,evDeck,event,efx,vit:0,meteorHit:null,meteorResolved:false,eventDrawn:true,
      log:alog(log,"Earth collapsed."),phase:"gameover",outcome:"collapse",gameoverMsg:"Earth collapsed. Everyone loses."};
    return{...s,evDeck,event,efx,vit,meteorHit:null,meteorResolved:false,eventDrawn:true,log};
  }
  case"RESOLVE_METEOR":{
    if(!s.event||s.event.et!=="meteor"||s.meteorResolved)return s;
    const pi=0|Math.random()*s.players.length;
    const free=s.players[pi].grid.filter(t=>t.dmg===0);
    let meteorHit=null,players=s.players,log=s.log;
    if(free.length){const hit=free[0|Math.random()*free.length];meteorHit={name:players[pi].name,tile:hit.id,had:!!hit.c};players=players.map((p,i)=>i!==pi?p:{...p,grid:p.grid.map(t=>t.id===hit.id?{...t,c:null,dmg:3}:t)});log=alog(log,`☄️ ${meteorHit.name} T${hit.id}!`);}
    return{...s,players,meteorHit,meteorResolved:true,log};
  }
  case"DEAL_DRAFT":{
    // Draft size ramps smoothly with Vitality (n at 0 up to n*2+2 at full 10) instead of
    // 3 flat tiers — Earth's shipments shrink proportionally with the damage it's taken.
    // The per-round DRAFT_MIN guarantee below is untouched by this, so a low count never
    // blocks the minimums a round needs — it only thins out the extra/random filler.
    const n=s.players.length,v=s.vit;let count=n+Math.round((v/10)*(n+2));if(s.efx.extraCard)count+=1;
    const sd=[...s.seedDeck];let hd=[...s.hwDeck];
    const hasResearch=s.players.some(p=>p.colony.re.filter(Boolean).length>0);
    // Round 1: guarantee every player starts with their own Basic Irrigator so nobody opens
    // with a zero-harvest round for lack of water — dealt directly, one per player, before
    // the general random hardware pool below. Bypasses Supply Shortage on purpose; a bad
    // draw shouldn't compound with "also nobody has water yet."
    let guaranteedIrrig=[];
    if(s.round===1){
      guaranteedIrrig=shuf(hd.filter(h=>h.hwt==="bIrrig")).slice(0,n);
      const gIds=new Set(guaranteedIrrig.map(c=>c.id));
      hd=hd.filter(h=>!gIds.has(h.id));
    }
    // Round 3, Vitality critical: things are struggling completely, so Earth spares one
    // extra piece of whatever tech NOBODY has anywhere yet (hand or grid) — targeted at
    // the shared gap rather than a random extra, and allowed to bypass the v<=3 tech
    // lockout below since this IS the emergency response to that exact situation.
    let bonusTech=null;
    if(s.round===3&&v<4){
      const heldTypes=new Set();
      s.players.forEach(p=>{
        p.hand.forEach(c=>{if(c.t==="hw")heldTypes.add(c.hwt);});
        p.grid.forEach(t=>{if(t.c&&t.c.t==="hw")heldTypes.add(t.c.card.hwt);});
      });
      const missingPool=hd.filter(h=>!heldTypes.has(h.hwt)&&s.round>=h.avail&&(h.hwt!=="cReg"||hasResearch));
      if(missingPool.length){
        bonusTech=shuf(missingPool)[0];
        hd=hd.filter(h=>h.id!==bonusTech.id);
      }
    }
    // Hardware is scarce, not a flood: cap how much of it Earth can spare this round to
    // roughly one piece per player at full Vitality, shrinking with the damage it's taken
    // — a struggling Earth can't afford to keep shipping up new infrastructure. Tech
    // Breakthrough (freeHW) is the one event that loosens this.
    const hwCap=Math.max(1,Math.round((v/10)*n))+(s.efx.freeHW?2:0);
    const avHW=(s.efx.seedsOnly?[]:shuf(hd.filter(h=>s.round>=h.avail&&!(v<=3&&h.avail>1)&&(h.hwt!=="cReg"||hasResearch))).slice(0,hwCap))
      .concat(bonusTech?[bonusTech]:[]);
    const min=DRAFT_MIN[s.round]||{g:0,gr:0,ex:0};
    const seedPicks=[];
    for(const crop of["g","gr","ex"]){const need=min[crop]||0;seedPicks.push(...sd.filter(c=>c.crop===crop).slice(0,need));}
    const pickedIds=new Set(seedPicks.map(c=>c.id));
    const seedTarget=Math.max(count-avHW.length,seedPicks.length);
    const remainder=sd.filter(c=>!pickedIds.has(c.id));
    const reserve={g:0,gr:0,ex:0};
    for(let fr=s.round+1;fr<=6;fr++){const fm=DRAFT_MIN[fr]||{g:0,gr:0,ex:0};reserve.g+=fm.g;reserve.gr+=fm.gr;reserve.ex+=fm.ex;}
    const protectedIds=new Set();
    for(const crop of["g","gr","ex"]){
      const avail=remainder.filter(c=>c.crop===crop);
      avail.slice(0,Math.min(reserve[crop]||0,avail.length)).forEach(c=>protectedIds.add(c.id));
    }
    const eligible=remainder.filter(c=>!protectedIds.has(c.id));
    const extra=shuf(eligible).slice(0,Math.max(0,seedTarget-seedPicks.length));
    const seedsPicked=[...seedPicks,...extra];
    const picked=shuf([...avHW,...seedsPicked]);
    const usedS=new Set(seedsPicked.map(c=>c.id));
    const usedH=new Set(avHW.map(c=>c.id));
    // Nobody chooses which card they get — Earth hands them out at random. Card count
    // per player stays fair (each player gets floor/ceil(picked/n) cards) — and when the
    // total doesn't divide evenly, WHO gets the leftover extra card(s) is itself randomized
    // per round, not always the same seat. (Building the recipient list via draftOrder[i%n]
    // and merely shuffling its ORDER does NOT achieve this — the count of each player index
    // in that list is fixed by construction, so draftOrder[0] would win every single odd
    // round. The fix picks the "gets +1" players randomly first, then fills counts.)
    const dOrd=s.draftOrder,dn=dOrd.length;
    const base=Math.floor(picked.length/dn),rem=picked.length%dn;

function MeteorReveal({meteorHit,meteorResolved,players}){
  const[stage,setStage]=useState("idle");
  const[flickName,setFlickName]=useState("");
  const[flickTile,setFlickTile]=useState(1);
  useEffect(()=>{
    if(!meteorResolved){setStage("idle");return;}
    setStage("player");
    let n=0;
    const iv1=setInterval(()=>{
      n++;setFlickName(players[0|Math.random()*players.length].name);
      if(n>=8){
        clearInterval(iv1);setStage("tile");
        let m=0;
        const iv2=setInterval(()=>{
          m++;setFlickTile(1+(0|Math.random()*9));
          if(m>=8){clearInterval(iv2);setStage("done");}
        },90);
      }
    },90);
    return()=>clearInterval(iv1);
  },[meteorResolved]);
  if(stage==="idle")return null;
  return <div style={{marginTop:8,padding:8,background:"rgba(127,29,29,0.15)",border:"1px solid #7f1d1d",borderRadius:2}}>
    <div style={{fontSize:10,color:"#f87171",marginBottom:4}}>☄️ Impact roll</div>
    <div style={{fontSize:12,color:"#fca5a5"}}>Player (d4): {stage==="player"?flickName:(meteorHit?meteorHit.name:"—")}</div>
    <div style={{fontSize:12,color:"#fca5a5"}}>Zone (d10): {stage==="player"?"—":stage==="tile"?`T${flickTile}`:meteorHit?`T${meteorHit.tile}`:"10 (miss)"}</div>
    {stage==="done"&&<div style={{fontSize:10,color:"#f87171",marginTop:4}}>{meteorHit?(meteorHit.had?"Contents destroyed. ":"Was empty. ")+"Zone blocked 3 rounds.":"Roll of 10 — miss, no effect."}</div>}
  </div>;
}
// Viewport-aware tooltip: measures its own rendered position after mount and flips
// horizontal/vertical anchor so it never renders off-screen near a viewport edge.
function EdgeTip({text}){
  const ref=useRef(null);
  const[h,setH]=useState("center");
  const[v,setV]=useState("top");
  useEffect(()=>{
    const el=ref.current;if(!el)return;
    const r=el.getBoundingClientRect();
    if(r.left<8)setH("left");else if(r.right>window.innerWidth-8)setH("right");
    if(r.top<8)setV("bottom");
  },[]);
  const hStyle=h==="left"?{left:0}:h==="right"?{right:0,left:"auto"}:{left:"50%",transform:"translateX(-50%)"};
  const vStyle=v==="bottom"?{top:"calc(100% + 9px)"}:{bottom:"calc(100% + 9px)"};
  const arrowSide=h==="center"?{left:"50%",transform:"translateX(-50%)"}:h==="left"?{left:16}:{right:16};
  const arrowStyle=v==="bottom"
    ?{position:"absolute",bottom:"100%",...arrowSide,width:0,height:0,borderLeft:"6px solid transparent",borderRight:"6px solid transparent",borderBottom:"6px solid #40d9c4"}
    :{position:"absolute",top:"100%",...arrowSide,width:0,height:0,borderLeft:"6px solid transparent",borderRight:"6px solid transparent",borderTop:"6px solid #40d9c4"};
  return <div ref={ref} style={{position:"absolute",...hStyle,...vStyle,background:"#0a0f1c",border:"1px solid #40d9c4",borderRadius:2,padding:"9px 11px",fontSize:12,color:"#c0ccdd",width:"min(220px,80vw)",lineHeight:1.5,zIndex:200,textAlign:"left",boxShadow:"0 6px 16px rgba(0,0,0,0.6)",pointerEvents:"none"}}>
    {text}
    <div style={arrowStyle}/>
  </div>;
}
function MirrorAimOverlay({tile,onSetDir,onClose}){

  const dirs=tile.c.dirs||[];
  const toggle=dir=>{const sel=dirs.includes(dir);const nd=sel?dirs.filter(x=>x!==dir):[...dirs,dir].slice(-max);onSetDir(tile.id,nd);};
  const dbtn=(dir,label,pos)=>{const sel=dirs.includes(dir);return <button onClick={()=>toggle(dir)}
    style={{position:"absolute",...pos,width:56,height:56,borderRadius:8,fontSize:24,fontWeight:"bold",background:sel?"#854d0e":"#1e3a5a",color:sel?"#fde047":"#93c5fd",border:`2px solid ${sel?"#fde047":"#2d4a6a"}`,cursor:"pointer"}}>{label}</button>;};
  return <div style={{position:"fixed",inset:0,background:"rgba(2,4,10,0.75)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={onClose}>
    <div onClick={e=>e.stopPropagation()} style={{...P,width:230,textAlign:"center"}}>

        {dbtn("up","↑",{top:0,left:"50%",transform:"translateX(-50%)"})}

      <button onClick={onClose} style={{...BTN,marginTop:10,width:"100%"}}>✓ Done</button>
    </div>
  </div>;
}
function PGrid({player,sunPos,efx,isActive,selCard,onPlace,onLift,onSwap,onSetDir,big}){
  const tv=useMemo(()=>computeTiles(player,sunPos,efx||{}),[player,sunPos,efx]);
  const sun=SUN[sunPos%4];
  const[hoverId,setHoverId]=useState(null);
  const[aimTile,setAimTile]=useState(null);
  const minH=big?92:60,nameFs=big?12:9,subFs=big?10:8,valFs=big?11:9;
  const aimingTile=aimTile&&player.grid.find(t=>t.id===aimTile);
  return <div>
    <div style={{fontSize:10,color:isActive?"#40d9c4":"#607890",marginBottom:3}}>{isActive?"▶ ":""}{player.name}</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:big?4:2}}>
      {player.grid.map(tile=>{
        const{l,w}=tv[tile.id];const dmg=tile.dmg>0;
        const sT=sun.core.includes(tile.id)?"core":sun.edge.includes(tile.id)?"edge":"shadow";
        const bg=dmg?"rgba(127,29,29,0.3)":sT==="core"?"rgba(120,80,0,0.15)":sT==="edge"?"rgba(20,28,45,0.9)":"rgba(8,12,20,0.9)";
        const canLift=tile.c&&!dmg&&(tile.c.t==="hw"||(tile.c.dormant||0)===0);
        const canSwap=isActive&&selCard&&canLift;
        const bc=dmg?"#7f1d1d":isActive&&selCard&&!tile.c&&!dmg?"#0d9488":canSwap?"#a16207":"#1e2d3d";
        const clickable=isActive&&((selCard&&!tile.c&&!dmg)||canLift);
        const isMirror=tile.c&&tile.c.t==="hw"&&(tile.c.card.hwt==="bMirror"||tile.c.card.hwt==="uMirror");
        return <div key={tile.id} onClick={()=>{if(!isActive)return;if(selCard&&!tile.c&&!dmg)onPlace(tile.id);else if(selCard&&canLift)onSwap(tile.id);else if(canLift)onLift(tile.id);}}
          onMouseEnter={()=>setHoverId(tile.id)} onMouseLeave={()=>setHoverId(null)}
          style={{background:bg,border:`1px solid ${bc}`,borderRadius:2,padding:big?"5px 6px":"3px 4px",minHeight:minH,cursor:clickable?"pointer":"default",position:"relative",boxSizing:"border-box"}}>
          <div style={{fontSize:big?10:9,color:"#374151"}}>{tile.id}</div>
          {dmg&&<div style={{color:"#f87171",fontSize:big?11:10}}>☄️{tile.dmg}r</div>}
          {!dmg&&tile.c&&<div style={{marginTop:1}}>
            {tile.c.t==="seed"&&<>
              <div style={{fontSize:nameFs,fontWeight:"bold",color:CC[tile.c.card.crop]}}>{tile.c.card.name}</div>
              <div style={{fontSize:subFs,color:"#607890"}}>L{tile.c.card.lr}W{tile.c.card.wr}</div>
              {(tile.c.dormant||0)>0&&<div style={{fontSize:subFs,color:"#f97316"}}>💤{tile.c.dormant}</div>}
            </>}
            {tile.c.t==="hw"&&<>
              <div style={{fontSize:nameFs,fontWeight:"bold",color:"#93c5fd"}}>{tile.c.card.name}</div>
              {isActive&&isMirror&&
                <button onClick={e=>{e.stopPropagation();setAimTile(tile.id);}}
                  style={{marginTop:2,fontSize:big?11:9,padding:big?"5px 8px":"3px 6px",background:"#1e3a5a",color:"#93c5fd",border:"1px solid #2d4a6a",borderRadius:3,cursor:"pointer"}}>
                  🧭 {(tile.c.dirs||[]).length}/{tile.c.card.hwt==="uMirror"?2:1}
                </button>
              }
            </>}
          </div>}
          {!dmg&&<div style={{position:"absolute",bottom:2,right:3,fontSize:valFs,display:"flex",gap:2}}>
            <span style={{color:"#facc15"}}>☀{l}</span><span style={{color:"#60a5fa"}}>💧{w}</span>
          </div>}
          {hoverId===tile.id&&tile.c&&<EdgeTip text={tile.c.t==="hw"?hwFullDesc(tile.c.card):seedFullDesc(tile.c.card)}/>}
        </div>;
      })}
    </div>
    {aimingTile&&<MirrorAimOverlay tile={aimingTile} onSetDir={onSetDir} onClose={()=>setAimTile(null)}/>}
  </div>;
}

  </div>;
}

const HW_FULL_DESC={
  bMirror:"Basic Solar Mirror — redirects +1 Light onto one adjacent tile of your choice. Rotate it during Engineering to change which tile it lights up.",
  uMirror:"Upgraded Solar Mirror — redirects +1 Light onto two different adjacent tiles at the same time.",
  bIrrig:"Basic Irrigator — adds +1 Water to its own tile and every orthogonally adjacent tile (up to 5 tiles total).",
  uIrrig:"Upgraded Irrigator — adds +1 Water to its own tile and all 8 surrounding tiles (up to 9 tiles total).",
  cReg:"Climate Regulator — adds +1 Light and +1 Water to its own tile and every surrounding tile. Requires a Research colony slot filled before it can be drafted.",
};
function hwFullDesc(card){return HW_FULL_DESC[card.hwt]||card.desc;}
function seedFullDesc(card){return `${CL[card.crop]} seed — needs Light ${card.lr}+ and Water ${card.wr}+ to mature. On success it yields ${card.yld} ${CL[card.crop]} into your stockpile; otherwise it stays dormant and dies after 3 consecutive failed rounds.`;}
function HoverTip({text,children}){
  const[show,setShow]=useState(false);
  if(!text)return children;
  return <div style={{position:"relative"}} onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}>
    {children}
    {show&&<EdgeTip text={text}/>}
  </div>;
}
function Chip({card,sel,onClick}){
  const isSeed=card.t==="seed";
  const bc=sel?"#0d9488":isSeed?CC[card.crop]:"#1e3a5a";
  const bg=isSeed?(card.crop==="g"?"rgba(0,40,20,0.8)":card.crop==="gr"?"rgba(40,30,0,0.8)":"rgba(25,5,40,0.8)"):"rgba(0,15,40,0.8)";
  const tip=isSeed?seedFullDesc(card):hwFullDesc(card);
  return <HoverTip text={tip}>
    <div onClick={onClick} style={{background:bg,border:`1px solid ${bc}`,borderRadius:2,padding:"8px 12px",cursor:"pointer",display:"inline-block",boxShadow:sel?`0 0 0 1px #0d9488`:"none",marginBottom:4}}>

}

function PlayerTradeHand({player,others,interactive,onOffer}){

  return <div style={P}>

        <td style={{padding:"3px 4px",color:CC[k]}}>{CL[k]}</td>

        </div></td>
        <td style={{padding:4}}><div style={{display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>
          <button onClick={()=>adj("i",k,-1)} style={{background:"#1e2d3d",color:"#60a5fa",border:"1px solid #2d4a6a",borderRadius:4,width:30,height:30,fontSize:17,fontWeight:"bold",lineHeight:1,cursor:"pointer"}}>-</button>
          <span style={{color:"#c084fc",minWidth:18,textAlign:"center"}}>{inv[k]}</span>

    <div style={{marginBottom:8,paddingTop:6,borderTop:"1px solid #1e2d3d"}}>

}

// ─── MAIN APP ────────────────────────────────────────────
function App(){
  const[started,setStarted]=useState(false);
  const[storyDone,setStoryDone]=useState(false);
  const[introDone,setIntroDone]=useState(false);
  const[volume,setVolume]=useState(0.5);
  const[muted,setMuted]=useState(false);
  const introAudio=useRef(null),setupAudio=useRef(null),gameAudio=useRef(null);
  const[pCount,setPCount]=useState(2);
  const[pNames,setPNames]=useState(["Player 1","Player 2","Player 3","Player 4"]);
  const[pAI,setPAI]=useState([null,null,null,null]);
  // Hotseat/vs-computer only: whose hand is currently touchable in the Trade window.
  // Remote play doesn't use this — each device already only ever touches its own seat.
  const[tradeTurnIdx,setTradeTurnIdx]=useState(0);
  const[state,dispatch]=useReducer(reducer,null,()=>makeState(["Player 1","Player 2"]));
  // Remote play: null = not decided yet, "local" = same-device hotseat (unchanged
  // behavior), "online" = synced through Firestore. mySeat is which player index THIS
  // browser controls — never synced, it's purely local knowledge of "who am I."
  const[connectMode,setConnectMode]=useState(null);
  const[roomCode,setRoomCode]=useState(null);
  const[mySeat,setMySeat]=useState(0);
  const[copied,setCopied]=useState(false);
  const copyRoomCode=()=>{
    const fallback=()=>{
      const ta=document.createElement("textarea");ta.value=roomCode;document.body.appendChild(ta);ta.select();
      try{document.execCommand("copy");}catch(e){}
      document.body.removeChild(ta);
    };
    if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(roomCode).catch(fallback);
    else fallback();
    setCopied(true);
    setTimeout(()=>setCopied(false),1500);
  };
  const[isNarrow,setIsNarrow]=useState(()=>typeof window!=="undefined"&&window.innerWidth<=820);
  const[isPortrait,setIsPortrait]=useState(()=>typeof window!=="undefined"&&window.innerHeight>window.innerWidth);
  const[rotateDismissed,setRotateDismissed]=useState(false);
  useEffect(()=>{
    const onResize=()=>{setIsNarrow(window.innerWidth<=820);setIsPortrait(window.innerHeight>window.innerWidth);};
    onResize();
    window.addEventListener("resize",onResize);
    window.addEventListener("orientationchange",onResize);
    return()=>{window.removeEventListener("resize",onResize);window.removeEventListener("orientationchange",onResize);};
  },[]);
  const stateRef=useRef(state);
  stateRef.current=state;
  const D=a=>{
    dispatch(a);
    if(roomCode){
      const next=reducer(stateRef.current,a);
      getDb().collection("rooms").doc(roomCode).set({state:next}).catch(()=>{});
    }
  };
  useEffect(()=>{
    if(!roomCode)return;
    const unsub=getDb().collection("rooms").doc(roomCode).onSnapshot(snap=>{
      const data=snap.data();
      if(data&&data.state)dispatch({type:"__SET_REMOTE_STATE__",state:data.state});
    });
    return unsub;
  },[roomCode]);
  useEffect(()=>{
    // Joiner: once the host has actually configured players, skip straight past the
    // (host-only) setup screen into the live game.
    if(connectMode==="online"&&mySeat!==0&&state.gameStarted)setStarted(true);
  },[connectMode,mySeat,state.gameStarted]);

  // AI turn automation — hotseat only (online is strictly 2 real people). A short delay
  // just makes it feel like the computer is actually taking its turn rather than the UI
  // silently skipping someone.
  useEffect(()=>{
    if(connectMode==="online")return;
    if(state.phase!=="engineering")return;
    const p=state.players[state.engIdx];
    if(!p||!p.isAI)return;
    const t=setTimeout(()=>{
      const moves=aiPlanEngineering(p,state.sunPos,state.efx);
      for(const mv of moves){
        D({type:"SEL_CARD",card:mv.card});
        D({type:"PLACE",tileId:mv.tileId});
        if(mv.dirs&&mv.dirs.length)D({type:"SET_DIR",tileId:mv.tileId,dirs:mv.dirs});
      }
      D({type:"NEXT_ENG"});
    },700);
    return()=>clearTimeout(t);
  },[connectMode,state.phase,state.engIdx]);
  useEffect(()=>{
    if(connectMode==="online")return;
    if(state.phase!=="contribute"||state.contribsRevealed)return;
    const pi=state.contribIdx;
    const p=state.players[pi];
    if(!p||!p.isAI)return;
    const t=setTimeout(()=>{
      const{ship,invest}=aiContribution(p,state.round,state.vit,state.efx,state.players.length,p.isAI);
      D({type:"SUBMIT",id:p.id,data:{ship,invest}});
    },700);
    return()=>clearTimeout(t);
  },[connectMode,state.phase,state.contribIdx,state.contribsRevealed]);
  // Trade: each round, the AI reads the actual situation before offering anything —
  // Earth's Vitality, its own spare cards, and the recipient's hand+grid (does this card
  // even fit anywhere for them, do they already have this type) — rather than just
  // dumping whatever it can't place itself. Doesn't finalize — the human decides when to
  // hit Initiate Trade.
  const aiTradedRound=useRef(null);
  useEffect(()=>{
    if(connectMode==="online")return;
    if(state.phase!=="trade"||state.efx.embargo)return;
    if(aiTradedRound.current===state.round)return;
    aiTradedRound.current=state.round;
    const t=setTimeout(()=>{
      const urgency=state.vit>=7?"healthy":state.vit>=4?"struggling":"critical";
      state.players.forEach((p,idx)=>{
        if(!p.isAI)return;
        const moves=aiPlanEngineering(p,state.sunPos,state.efx);
        const placedIds=new Set(moves.map(m=>m.card.id));
        const spareRaw=p.hand.filter(c=>!placedIds.has(c.id));
        // Never give away every seed of a crop type -- keep at least one of each in
        // reserve for a future round (once more hardware/light/water becomes available)
        // instead of emptying out entirely just because none of it fits the grid *this*
        // round. A second (duplicate) seed of the same crop is fair game to trade away;
        // surplus hardware (already capped in aiPlanEngineering) trades freely too.
        const seenCrop=new Set();
        const candidates=[];
        for(const c of spareRaw){
          if(c.t==="seed"){
            if(!seenCrop.has(c.crop)){seenCrop.add(c.crop);continue;}
          }
          candidates.push(c);
        }
        if(!candidates.length)return;
        let toIdx=state.players.findIndex((pp,i)=>i!==idx&&!pp.isAI);
        if(toIdx<0)toIdx=state.players.findIndex((pp,i)=>i!==idx);
        if(toIdx<0)return;
        const recipient=state.players[toIdx];
        // Guardian/Balanced read the recipient's hand+grid and prefer offering whatever
        // actually helps them; Opportunist doesn't bother checking, it just goes in
        // whatever order the cards happened to end up spare.
        const ranked=p.isAI==="opportunist"?candidates
          :[...candidates].sort((a,b)=>aiTradeUsefulness(b,recipient,state.sunPos,state.efx)-aiTradeUsefulness(a,recipient,state.sunPos,state.efx));
        // How many cards it's willing to part with: Guardian leans in harder the worse
        // Earth's doing; Opportunist free-rides on trade the same way it free-rides on
        // shipping, only bothering once Vitality is genuinely at risk; Balanced is steady.
        const flush=p.hand.length>=6;
        let maxOffer;
        if(p.isAI==="guardian")maxOffer=urgency==="healthy"?(flush?2:1):(flush?3:2);
        else if(p.isAI==="opportunist")maxOffer=urgency==="healthy"?0:(flush?2:1);
        else maxOffer=flush?2:1;
        const spare=ranked.slice(0,maxOffer);
        if(!spare.length)return;
        spare.forEach(card=>D({type:"TRADE_OFFER",fromIdx:idx,toIdx,cardId:card.id}));
      });
    },700);
    return()=>clearTimeout(t);
  },[connectMode,state.phase,state.round]);
  // Hotseat/vs-computer: only one player's hand is touchable at a time, so nobody can
  // reach over (or the human can't reach into the computer's hand) and offer cards that
  // aren't theirs. Resets fresh each time the Trade window opens; AI turns auto-skip since
  // the effect above already made their offers.
  useEffect(()=>{
    if(state.phase==="trade")setTradeTurnIdx(0);
  },[state.phase,state.round]);
  useEffect(()=>{
    if(connectMode==="online")return;
    if(state.phase!=="trade")return;
    const p=state.players[tradeTurnIdx];
    if(!p||!p.isAI)return;
    const t=setTimeout(()=>setTradeTurnIdx(i=>Math.min(i+1,state.players.length)),400);
    return()=>clearTimeout(t);
  },[connectMode,state.phase,tradeTurnIdx,state.players]);

  useEffect(()=>{
    const a=new Audio(AUDIO_INTRO);a.loop=true;
    const s=new Audio(AUDIO_SETUP);s.loop=true;
    // Main-game music shuffles through the playlist instead of looping one track — pick a
    // random track (never immediately repeating the one that just played) each time the
    // current one ends.
    const b=new Audio();b.loop=false;
    let curTrack=-1;
    const nextTrack=()=>{
      let i=0|Math.random()*AUDIO_GAMEPLAY_TRACKS.length;
      if(AUDIO_GAMEPLAY_TRACKS.length>1)while(i===curTrack)i=0|Math.random()*AUDIO_GAMEPLAY_TRACKS.length;
      curTrack=i;
      b.src=AUDIO_GAMEPLAY_TRACKS[i];
    };
    nextTrack();
    b.addEventListener("ended",()=>{nextTrack();b.play().catch(()=>{});});
    introAudio.current=a;setupAudio.current=s;gameAudio.current=b;
    return()=>{a.pause();s.pause();b.pause();};
  },[]);
  useEffect(()=>{
    const v=muted?0:volume;
    [introAudio,setupAudio,gameAudio].forEach(r=>{if(r.current)r.current.volume=v;});
  },[volume,muted]);
  const showingStory=started&&!storyDone;
  useEffect(()=>{
    const all=[introAudio,setupAudio,gameAudio];
    // Three music zones: loading screen ("Space Farmer") -> Connect/Setup ("Orbital Corn
    // Rows") -> the main game, story screen through actual rounds, as one continuous
    // shuffled zone (Moonlit Save Point + the two Focus Flow tracks).
    if(!introDone){
      all.forEach(r=>r.current&&r.current.pause());
      if(introAudio.current)introAudio.current.currentTime=0;
      introAudio.current&&introAudio.current.play().catch(()=>{});
    } else if(!started){
      all.forEach(r=>{if(r!==setupAudio&&r.current)r.current.pause();});
      if(setupAudio.current)setupAudio.current.currentTime=0;
      setupAudio.current&&setupAudio.current.play().catch(()=>{});
    } else {
      all.forEach(r=>{if(r!==gameAudio&&r.current)r.current.pause();});
      if(gameAudio.current)gameAudio.current.currentTime=0;
      gameAudio.current&&gameAudio.current.play().catch(()=>{});
    }
  },[introDone,started]);
  const unlockAudio=()=>{if(!introDone&&introAudio.current)introAudio.current.play().catch(()=>{});};
  useEffect(()=>{
    if(introDone)return;
    const tryPlay=()=>introAudio.current&&introAudio.current.play().catch(()=>{});
    document.addEventListener("pointerdown",tryPlay,{capture:true});
    document.addEventListener("keydown",tryPlay,{capture:true});
    return()=>{document.removeEventListener("pointerdown",tryPlay,{capture:true});document.removeEventListener("keydown",tryPlay,{capture:true});};
  },[introDone]);
  useEffect(()=>{
    const root=document.documentElement.style;
    const grab=()=>root.setProperty("--sfp-cursor",CURSOR_FIST);
    const release=()=>root.setProperty("--sfp-cursor",CURSOR_HAND);
    document.addEventListener("mousedown",grab);
    document.addEventListener("mouseup",release);
    window.addEventListener("blur",release);
    return()=>{
      document.removeEventListener("mousedown",grab);
      document.removeEventListener("mouseup",release);
      window.removeEventListener("blur",release);
    };
  },[]);

  if(!introDone)return <LoadingScreen onBegin={()=>setIntroDone(true)} volume={volume} muted={muted} onVolume={setVolume} onMute={()=>setMuted(m=>!m)} onUnlockAudio={unlockAudio}/>;

  if(!connectMode)return <ConnectScreen
    onLocal={()=>setConnectMode("local")}
    onVsComputer={()=>{
      setPCount(2);
      setPAI([false,true,false,false]);
      setPNames(n=>{const nn=[...n];if(!nn[1]||nn[1]==="Player 2")nn[1]="Computer";return nn;});
      setConnectMode("local");
    }}
    onCreate={()=>{const code=makeRoomCode();setRoomCode(code);setMySeat(0);setPCount(2);setConnectMode("online");}}
    onJoin={code=>{setRoomCode(code);setMySeat(1);setConnectMode("online");}}
    volume={volume} muted={muted} onVolume={setVolume} onMute={()=>setMuted(m=>!m)}/>;

  if(connectMode==="online"&&mySeat!==0&&!state.gameStarted)
    return <RoomWaiting roomCode={roomCode} volume={volume} muted={muted} onVolume={setVolume} onMute={()=>setMuted(m=>!m)}/>;

  // Setup
  if(!started)return <div style={{background:"#02040a",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,position:"relative"}}>
    <Starfield/>
    <div style={{position:"absolute",top:16,right:20}}><VolumeControl volume={volume} muted={muted} onVolume={setVolume} onMute={()=>setMuted(m=>!m)}/></div>
    <div style={{...P,width:"100%",maxWidth:400,border:"2px solid #134e4a",boxShadow:"0 0 24px rgba(19,78,74,0.4)"}}>
      <div style={{textAlign:"center",marginBottom:22}}>
        <div style={{fontFamily:PIXEL,fontSize:14,color:"#40d9c4",letterSpacing:1,lineHeight:1.8,textShadow:"2px 2px 0 #134e4a"}}>SPACE FARMER<br/>PRO</div>
      </div>
      {connectMode==="online"&&<div style={{...P,marginBottom:14,textAlign:"center",border:"1px solid #facc15"}}>
        <div style={{fontSize:10,color:"#607890"}}>Room code — share this with your friend:</div>
        <div style={{fontFamily:PIXEL,fontSize:20,color:"#facc15",letterSpacing:6,marginTop:8}}>{roomCode}</div>
        <button onClick={copyRoomCode} style={{...BTN2,marginTop:10,width:"100%"}}>{copied?"✓ Copied!":"📋 Copy Room Code"}</button>
      </div>}
      {connectMode!=="online"&&<div style={{marginBottom:10}}><div style={{...LBL,marginBottom:6}}>Players</div>
        <div style={{display:"flex",gap:6}}>{[2,3,4].map(n=><button key={n} onClick={()=>setPCount(n)} style={{...BTN,background:pCount===n?"#134e4a":"#0a0f1c",color:pCount===n?"#40d9c4":"#607890"}}>{n}P</button>)}</div>
      </div>}
      {Array.from({length:pCount},(_,i)=><div key={i} style={{display:"flex",gap:6,alignItems:"center"}}>
        <input value={pNames[i]} onChange={e=>{const n=[...pNames];n[i]=e.target.value;setPNames(n);}} style={{...INP,flex:1}} placeholder={`Player ${i+1}`}/>
        {connectMode!=="online"&&<button onClick={()=>{const a=[...pAI];a[i]=!a[i];setPAI(a);}} title={pAI[i]?"Computer-controlled — personality is randomly assigned when the mission launches":"Human-controlled — click to make this an AI player"} style={{...BTN2,padding:"8px 10px",background:pAI[i]?"#134e4a":"#0a0f1c",color:pAI[i]?"#40d9c4":"#607890",marginBottom:6}}>🤖</button>}
      </div>)}
      <button onClick={()=>{D({type:"RESET",names:pNames.slice(0,pCount),aiFlags:pAI.slice(0,pCount).map(f=>f?randomPersonality():null)});setStarted(true);}} style={{...BTN,width:"100%",marginTop:12,fontSize:12,letterSpacing:1}}>▶ LAUNCH MISSION</button>
    </div>
  </div>;

  // Story / how-to-play — once per device after setup, independent per player.
  if(showingStory)return <IntroStory onDone={()=>setStoryDone(true)}/>;

  // Game over
  if(state.phase==="gameover"){
    const winners=state.winners||(state.winner?[state.winner]:[]);
    const OUTCOMES={
      selfsuff:{icon:"🏙️✨",title:"COLONY ESTABLISHED",sub:`${state.winner} reached full self-sufficiency and wins immediately — every other colony is abandoned, regardless of DP.`,border:"#a16207",titleColor:"#fde047"},
      earthsaved:{icon:"🌍💚",title:"EARTH SAVED",sub:"Six rounds complete, Earth still stands. Final scores, adjusted by Earth's Vitality:",border:"#134e4a",titleColor:"#40d9c4"},
      collapse:{icon:"🥀🧑‍🌾",title:"EARTH HAS FALLEN",sub:"Vitality reached zero. The last transmission from Earth goes silent — no one wins.",border:"#7f1d1d",titleColor:"#f87171"},
      draw:{icon:"🤝🏆",title:"IT'S A DRAW",sub:state.gameoverMsg,border:"#a16207",titleColor:"#fde047"},
    };
    const o=OUTCOMES[state.outcome]||{icon:state.winner?"🏆":"💀",title:state.winner?"MISSION COMPLETE":"MISSION FAILED",sub:state.gameoverMsg,border:"#134e4a",titleColor:"#40d9c4"};
    return <div style={{background:"#02040a",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:16,position:"relative"}}>
      <Starfield/>
      <div style={{position:"absolute",top:16,right:20}}><VolumeControl volume={volume} muted={muted} onVolume={setVolume} onMute={()=>setMuted(m=>!m)}/></div>
      <div style={{...P,width:"100%",maxWidth:440,textAlign:"center",border:`2px solid ${o.border}`,boxShadow:`0 0 28px ${o.border}66`}}>
        <div style={{fontSize:40,marginBottom:8}}>{o.icon}</div>
        <div style={{fontFamily:PIXEL,fontSize:14,color:o.titleColor,marginBottom:14,lineHeight:1.8,letterSpacing:0.5}}>{o.title}</div>
        <div style={{color:"#c0ccdd",marginBottom:16,lineHeight:1.5}}>{o.sub}</div>
        {state.players.map(p=>{const dp=calcDP(p,state.vit);const isWinner=winners.includes(p.name);return <div key={p.id} style={{...P,textAlign:"left",marginBottom:6,border:isWinner?"1px solid #fde047":undefined,opacity:(state.outcome==="selfsuff"||state.outcome==="draw")&&!isWinner?0.5:1}}>
          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"#c0ccdd",fontWeight:"bold"}}>{isWinner?"🏆 ":""}{p.name}</span><span style={{color:"#40d9c4",fontWeight:"bold"}}>{dp} DP</span></div>
          <div style={{fontSize:10,color:"#607890",marginTop:2}}>LS{p.colony.ls.filter(Boolean).length}/6 AG{p.colony.ag.filter(Boolean).length}/4 RE{p.colony.re.filter(Boolean).length}/3 · 🏆×{p.roundWins||0}</div>
          <ColonyDisplay player={p}/>
        </div>;})}
        <div style={{fontSize:11,color:"#607890",marginBottom:12}}>Vitality: {state.vit}/10 · Mult ×{state.vit>=7?1:state.vit>=4?0.5:0.25}</div>
        <button onClick={()=>setStarted(false)} style={BTN}>New Mission</button>
      </div>
    </div>;
  }

  const{phase,round,sunPos,vit,players,draft,draftIdx,draftOrder,engIdx,tradePile,event,efx,meteorHit,eventDrawn,meteorResolved,harvestResults,harvestLeaders,shipResult,contribs,contribIdx,contribsRevealed,selCard,log,tiebreak}=state;
  const demand=DEMAND[round]||{g:0,gr:0,ex:0};
  const adjDem={g:demand.g+(efx.demG||0),gr:demand.gr,ex:efx.demExDouble?demand.ex*2:demand.ex};
  let activeIdx=null;
  if(phase==="engineering"&&engIdx<players.length)activeIdx=engIdx;
  else if(phase==="contribute"&&!contribsRevealed&&contribIdx<players.length)activeIdx=contribIdx;
  const remoteMode=connectMode==="online";
  const isMyTurn=!remoteMode||activeIdx===null||activeIdx===mySeat;
  // Playing solo against a computer: there's no other human whose agency a late retraction
  // could step on, so let that one human take back their own offer any time during Trade —
  // not just during their turn slot — in case the AI didn't offer anything back.
  const soloHuman=!remoteMode&&players.filter(p=>!p.isAI).length===1;
  const Waiting=({label})=><div style={{...P,textAlign:"center",padding:24}}>
    <div style={{color:"#607890",fontSize:12}}>⏳ Waiting for <b style={{color:"#c0ccdd"}}>{label}</b>...</div>
  </div>;

  return <div style={{background:"#02040a",minHeight:"100vh",color:"#c0ccdd",fontFamily:"monospace",fontSize:13,position:"relative"}}>
    <Starfield/>
    <VitalityEarth vit={vit}/>
    {isNarrow&&isPortrait&&!rotateDismissed&&<div style={{position:"fixed",inset:0,background:"rgba(2,4,10,0.92)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:24,textAlign:"center"}}>
      <div>
        <div style={{fontSize:44,marginBottom:12,animation:"sfp-bob 1.6s ease-in-out infinite"}}>🔄</div>
        <div style={{fontFamily:PIXEL,fontSize:13,color:"#40d9c4",marginBottom:12,lineHeight:1.8}}>ROTATE YOUR DEVICE</div>
        <div style={{color:"#c0ccdd",fontSize:12,marginBottom:20,lineHeight:1.6,maxWidth:280}}>The colony grids need a bit more room to breathe — landscape gives you a much easier time.</div>
        <button onClick={()=>setRotateDismissed(true)} style={BTN2}>Continue in portrait →</button>
      </div>
    </div>}
    {/* Header */}
    <div style={{background:"rgba(10,15,28,0.92)",borderBottom:"2px solid #134e4a",boxShadow:"0 2px 0 #042f2e",padding:"10px 20px",display:"flex",flexWrap:"wrap",gap:12,alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
      <div style={{display:"flex",gap:12,alignItems:"center"}}>
        <span style={{fontFamily:PIXEL,color:"#facc15",fontSize:12}}>R{round}/6</span>
        {remoteMode&&<span style={{fontSize:10,color:"#4b5563"}}>Room {roomCode} · you're {players[mySeat]?.name||`P${mySeat+1}`}</span>}
      </div>
      <VBar v={vit}/>
      <VolumeControl volume={volume} muted={muted} onVolume={setVolume} onMute={()=>setMuted(m=>!m)}/>
    </div>

    <div style={{display:"flex",flexDirection:isNarrow?"column":"row",gap:16,padding:"16px 24px",width:"min(1700px,96vw)",margin:"0 auto",position:"relative"}}>
      {/* Main content */}
      <div style={{flex:1,minWidth:0}}>

        {/* EVENT */}
        {phase==="event"&&<div style={P}>
          <div style={H2}>Round {round} — Sun & Event</div>
          {tiebreak&&<div style={{...P,border:"1px solid #a16207",marginBottom:10,color:"#fde047",fontSize:11}}>🏆 Tiebreak round — {tiebreak.contenders.join(" & ")} tied. Whoever harvests the most this round wins outright; still tied after this and it's a true draw.</div>}
          <div style={{marginBottom:12}}>
            {!eventDrawn?<div style={{...P,textAlign:"center",padding:22}}>
              <div style={{color:"#607890",fontSize:12,marginBottom:12}}>This round's Event Card hasn't been drawn yet.</div>
              <button onClick={()=>D({type:"DRAW_EVENT"})} style={BTN}>🎴 Draw Event Card</button>
            </div>:event?<div style={{...P,border:`1px solid ${event.et==="meteor"?"#7f1d1d":event.et==="bonus"?"#14532d":event.et==="pressure"?"#7c2d12":"#1e3a5a"}`}}>
              <div style={{fontSize:14,fontWeight:"bold",color:"#f1f5f9",marginBottom:4}}>{event.icon} {event.name}</div>
              <div style={{fontSize:12,color:"#c0ccdd",lineHeight:1.5}}>{event.desc}</div>
              {event.et==="meteor"&&!meteorResolved&&<button onClick={()=>D({type:"RESOLVE_METEOR"})} style={{...BTN,marginTop:8,background:"#7f1d1d",borderColor:"#f87171",color:"#fecaca"}}>☄️ Activate Strike</button>}
              {event.et==="meteor"&&meteorResolved&&<MeteorReveal meteorHit={meteorHit} meteorResolved={meteorResolved} players={players}/>}
              {efx.solarFlare&&<div style={{color:"#fde047",fontSize:11,marginTop:4}}>+1L all tiles · Mirrors offline</div>}
              {efx.embargo&&<div style={{color:"#f87171",fontSize:11,marginTop:4}}>Trade Embargo active</div>}
              {efx.seedsOnly&&<div style={{color:"#f97316",fontSize:11,marginTop:4}}>Seeds only in draft</div>}
              {efx.bumper&&<div style={{color:"#4ade80",fontSize:11,marginTop:4}}>+1 bonus on all harvests</div>}
            </div>:<div style={{...P,color:"#607890",fontSize:11}}>No event this round.</div>}
          </div>
          {eventDrawn&&(!event||event.et!=="meteor"||meteorResolved)&&<>
            <div style={{display:"grid",gridTemplateColumns:isNarrow?"1fr":`repeat(${Math.min(players.length,4)},1fr)`,gap:8,marginBottom:12}}>
              {players.map(p=><div key={p.id} style={{...P,padding:8}}>
                <PGrid player={p} sunPos={sunPos} efx={efx} isActive={false} selCard={null} big={isNarrow} onPlace={()=>{}} onLift={()=>{}} onSwap={()=>{}} onSetDir={()=>{}}/>
                <div style={{fontSize:9,color:"#607890",marginTop:3}}>G{p.stockpile.g} Gr{p.stockpile.gr} Ex{p.stockpile.ex}</div>
              </div>)}
            </div>
            <button onClick={()=>D({type:"DEAL_DRAFT"})} style={BTN}>→ Deal Draft</button>
          </>}
        </div>}

        {/* TRADE */}
        {phase==="trade"&&<div style={P}>
          <div style={H2}>Trading Window</div>
          <div style={{fontSize:11,color:"#607890",marginBottom:10}}>Offer cards you're willing to trade to the pile below, naming who they're for. Once everyone's happy, hit Initiate Trade to swap everything at once.</div>
          <div style={{...P,border:"1px solid #a16207",marginBottom:10}}>
            <div style={{fontSize:10,color:"#facc15",fontWeight:"bold",marginBottom:6}}>🔄 TRADE PILE {tradePile.length?`(${tradePile.length})`:""}</div>
            {tradePile.length?<div style={{display:"flex",flexDirection:"column",gap:6}}>
              {tradePile.map(o=><div key={o.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,background:"rgba(0,0,0,0.3)",borderRadius:2,padding:"6px 10px"}}>
                <div style={{fontSize:11,color:"#c0ccdd"}}><span style={{color:"#40d9c4"}}>{players[o.fromIdx]?.name}</span> → <span style={{color:"#facc15"}}>{players[o.toIdx]?.name}</span>: <b>{o.card.name}</b></div>
                {(remoteMode?o.fromIdx===mySeat:(soloHuman?!players[o.fromIdx]?.isAI:o.fromIdx===tradeTurnIdx))&&<button onClick={()=>D({type:"TRADE_RETRACT",cardId:o.id})} style={{...BTN2,fontSize:9,padding:"4px 8px"}}>↩ Retract</button>}
              </div>)}
            </div>:<div style={{fontSize:10,color:"#374151"}}>Nobody's offered anything yet.</div>}
          </div>
          {efx.embargo?<div style={{fontSize:11,color:"#f87171",marginBottom:10}}>🚫 Trade Embargo — no trades this round.</div>:<>
          {!remoteMode&&<div style={{fontSize:11,marginBottom:8}}>{tradeTurnIdx<players.length?<span style={{color:"#40d9c4"}}>{players[tradeTurnIdx]?.isAI?`🤖 ${players[tradeTurnIdx].name} is deciding...`:`👉 ${players[tradeTurnIdx]?.name}'s turn to offer — others, hands off!`}</span>:<span style={{color:"#4ade80"}}>✓ Everyone's had a turn.</span>}</div>}
          <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(players.length,4)},1fr)`,gap:8,marginBottom:10}}>
            {players.map((p,i)=><PlayerTradeHand key={p.id} player={p} interactive={remoteMode?i===mySeat:i===tradeTurnIdx}
              others={players.map((pp,ii)=>({idx:ii,name:pp.name})).filter(o=>o.idx!==i)}
              onOffer={(toIdx,cardId)=>D({type:"TRADE_OFFER",fromIdx:i,toIdx,cardId})}/>)}
          </div>
          {!remoteMode&&tradeTurnIdx<players.length&&!players[tradeTurnIdx]?.isAI&&<button onClick={()=>setTradeTurnIdx(i=>Math.min(i+1,players.length))} style={{...BTN2,width:"100%",marginBottom:10}}>Done — Pass to Next Player →</button>}
          </>}
          <button onClick={()=>D({type:"TRADE_INITIATE"})} style={BTN}>{tradePile.length?`🤝 Initiate Trade (${tradePile.length})`:"→ Continue (no trades)"}</button>
        </div>}

        {/* ENGINEERING */}
        {phase==="engineering"&&(()=>{
          const p=players[engIdx];const tv=computeTiles(p,sunPos,efx||{});
          return <div style={P}>
            <div style={H2}>Engineering — {p?.name}{p?.isAI?` 🤖${personalityOf(p.isAI)?.icon||""}`:""} ({engIdx+1}/{players.length})</div>
            {p?.isAI?<div style={{...P,textAlign:"center",padding:24}}><div style={{color:"#607890",fontSize:12}}>🤖 {p.name} is thinking...</div></div>:remoteMode&&!isMyTurn?<Waiting label={p?.name}/>:<>
            <div style={{fontSize:10,color:"#607890",marginBottom:8}}>Click card to select → click tile to place. Click placed piece to return to hand.</div>
            <div style={{display:"grid",gridTemplateColumns:isNarrow?"1fr":"1fr 1fr",gap:12}}>
              <div>
                <div style={{...LBL,marginBottom:4}}>Hand ({p?.hand.length}) {selCard&&<span style={{color:"#40d9c4"}}> — {selCard.name}</span>}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10,minHeight:30}}>{p?.hand.map(c=><Chip key={c.id} card={c} sel={selCard&&selCard.id===c.id} onClick={()=>D({type:"SEL_CARD",card:c})}/>)}</div>
                <PGrid player={p} sunPos={sunPos} efx={efx} isActive={true} selCard={selCard} big={isNarrow}
                  onPlace={tid=>D({type:"PLACE",tileId:tid})} onLift={tid=>D({type:"LIFT",tileId:tid})} onSwap={tid=>D({type:"SWAP",tileId:tid})} onSetDir={(tid,dirs)=>D({type:"SET_DIR",tileId:tid,dirs})}/>
                {p&&p.colony.ag.filter(Boolean).length>=2&&p.colony.agriWater&&
                  <div style={{marginTop:6,fontSize:10,color:"#60a5fa"}}>★ +1W bonus tile:
                    <select value={p.colony.agriWater} onChange={e=>D({type:"SET_AGRI_WATER",pid:p.id,tid:+e.target.value})}
                      style={{marginLeft:6,background:"#0a0f1c",color:"#60a5fa",border:"1px solid #1e3a5a",borderRadius:2,padding:"1px 4px",fontFamily:"monospace"}}>
                      {[1,2,3,4,5,6,7,8,9].map(t=><option key={t} value={t}>{t}</option>)}
                    </select>
                  </div>
                }
              </div>
              <div>
                {/* Redundant with the ☀/💧 readout already shown on each tile — only worth
                    the extra real estate when there's a second column to put it in. */}
                {!isNarrow&&<>
                  <div style={{...LBL,marginBottom:4}}>Tile values</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:2,marginBottom:8}}>
                    {[1,2,3,4,5,6,7,8,9].map(t=><div key={t} style={{background:"#0a0f1c",border:"1px solid #1e2d3d",borderRadius:2,padding:"3px 0",textAlign:"center",fontSize:10}}>
                      <div style={{color:"#374151",fontSize:8}}>T{t}</div>
                      <span style={{color:"#facc15"}}>☀{tv[t]?tv[t].l:0}</span> <span style={{color:"#60a5fa"}}>💧{tv[t]?tv[t].w:0}</span>
                    </div>)}
                  </div>
                </>}
                {efx.solarFlare&&<div style={{fontSize:10,color:"#fde047",marginBottom:6}}>⚡ +1L all · Mirrors offline</div>}
                <ColonyDisplay player={p}/>
                {p&&<div style={{fontSize:10,color:"#607890",marginTop:4}}>Stock: G{p.stockpile.g} Gr{p.stockpile.gr} Ex{p.stockpile.ex}</div>}
              </div>
            </div>
            <button onClick={()=>D({type:"NEXT_ENG"})} style={{...BTN,marginTop:10}}>{engIdx+1>=players.length?"→ Harvest":"Next Player →"}</button>
            </>}
          </div>;
        })()}

        {/* HARVEST */}
        {phase==="harvest"&&<div style={P}>
          <div style={H2}>Harvest Phase</div>
          {!harvestResults?<>
            <div style={{fontSize:11,color:"#607890",marginBottom:8}}>Crops meeting L/W requirements will yield. Others go dormant (3 rounds = die).</div>
            <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(players.length,4)},1fr)`,gap:8,marginBottom:10}}>
              {players.map(p=>{const tv=computeTiles(p,sunPos,efx||{});const crops=p.grid.filter(t=>t.c&&t.c.t==="seed"&&!t.dmg);return <div key={p.id} style={{...P,padding:8}}>
                <div style={{fontSize:10,fontWeight:"bold",color:"#607890",marginBottom:4}}>{p.name}</div>
                {!crops.length&&<div style={{fontSize:9,color:"#374151"}}>No crops.</div>}
                {crops.map(tile=>{const{l,w}=tv[tile.id];const ok=l>=tile.c.card.lr&&w>=tile.c.card.wr;const overpowered=ok&&l>=tile.c.card.lr+1&&w>=tile.c.card.wr+1;const yld=tile.c.card.yld+(efx.bumper?1:0)+(overpowered?1:0);return <div key={tile.id} style={{fontSize:9,color:ok?"#4ade80":"#f87171",marginBottom:2}}>T{tile.id} {tile.c.card.name}: {ok?`✓+${yld}${overpowered?" ⚡":""}`:`✗ L${l}W${w}→L${tile.c.card.lr}W${tile.c.card.wr}`}</div>;})}
              </div>;})}
            </div>
            <button onClick={()=>D({type:"HARVEST"})} style={BTN}>→ Resolve Harvest</button>
          </>:<>
            {!!(harvestLeaders&&harvestLeaders.length)&&<div style={{fontSize:11,color:"#facc15",marginBottom:8}}>🏆 Harvest lead: {harvestLeaders.map(i=>players[i].name).join(", ")} — first pick next round, +2 DP banked</div>}
            <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(players.length,4)},1fr)`,gap:8,marginBottom:10}}>
              {players.map((p,pi)=>{const pLog=harvestResults.filter(h=>h.player===p.name);return <div key={p.id} style={{...P,padding:8,border:harvestLeaders&&harvestLeaders.includes(pi)?"1px solid #facc15":undefined}}>
                <div style={{fontSize:10,fontWeight:"bold",color:"#607890",marginBottom:4}}>{p.name}</div>
                {!pLog.length&&<div style={{fontSize:9,color:"#374151"}}>Nothing harvested.</div>}
                {pLog.map((h,i)=><div key={i} style={{fontSize:9,color:h.ok?"#4ade80":h.died?"#9f1239":"#f97316",marginBottom:2}}>T{h.tile} {h.name}: {h.ok?`+${h.yld}${h.overpowered?" ⚡overpowered":""}`:h.died?"💀 died":`💤${h.dormant}/3`}</div>)}
                <div style={{fontSize:9,color:"#607890",marginTop:3,borderTop:"1px solid #1e2d3d",paddingTop:3}}>G{p.stockpile.g} Gr{p.stockpile.gr} Ex{p.stockpile.ex}</div>
              </div>;})}
            </div>
            <div style={{fontSize:10,color:"#607890",marginBottom:8}}>Harvest resolved. Proceed to contributions.</div>
          </>}
        </div>}

        {/* CONTRIBUTE */}
        {phase==="contribute"&&<div style={P}>
          <div style={H2}>Phase V — Contribute to Earth</div>
          <div style={{fontSize:10,color:"#607890",marginBottom:8}}>Need: <span style={{color:"#4ade80"}}>G{adjDem.g}</span> <span style={{color:"#facc15"}}>Gr{adjDem.gr}</span> <span style={{color:"#c084fc"}}>Ex{adjDem.ex}</span> — each player allocates secretly.</div>
          <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(players.length,4)},1fr)`,gap:6,marginBottom:10}}>
            {players.map(p=><div key={p.id} style={{...P,padding:8}}>
              <div style={{fontSize:10,fontWeight:"bold",color:"#607890",marginBottom:3}}>{p.name} — total harvest</div>
              <span style={{color:"#4ade80",fontSize:11}}>G{p.stockpile.g} </span>
              <span style={{color:"#facc15",fontSize:11}}>Gr{p.stockpile.gr} </span>
              <span style={{color:"#c084fc",fontSize:11}}>Ex{p.stockpile.ex}</span>
            </div>)}
          </div>
          {!contribsRevealed?<>
            {remoteMode?(
              contribs[mySeat]&&!contribs[mySeat].done?
                <ContribForm player={players[mySeat]} onSubmit={(id,data)=>D({type:"SUBMIT",id,data})}/>
              :contribs.every(c=>c.done)?
                <div style={{textAlign:"center",padding:16}}>
                  <div style={{color:"#4ade80",marginBottom:10,fontSize:13}}>All submitted.</div>
                  <button onClick={()=>D({type:"REVEAL"})} style={{...BTN,fontSize:14,padding:"10px 24px",fontWeight:"bold"}}>🚀 Reveal All</button>
                </div>
              :<div style={{textAlign:"center",padding:16}}>
                  <div style={{color:"#607890",fontSize:12,marginBottom:10}}>✓ Submitted — waiting for the other player...</div>
                  <div style={{display:"flex",gap:12,justifyContent:"center"}}>
                    {players.map((p,i)=><div key={p.id} style={{fontSize:11,color:contribs[i]&&contribs[i].done?"#4ade80":"#607890"}}>{p.name}: {contribs[i]&&contribs[i].done?"✓":"⏳"}</div>)}
                  </div>
                </div>
            ):(
              contribIdx<players.length?(players[contribIdx].isAI?<div style={{...P,textAlign:"center",padding:24}}><div style={{color:"#607890",fontSize:12}}>🤖 {players[contribIdx].name} is thinking...</div></div>:<ContribForm key={contribIdx} player={players[contribIdx]} onSubmit={(id,data)=>D({type:"SUBMIT",id,data})}/>):
                <div style={{textAlign:"center",padding:16}}>
                  <div style={{color:"#4ade80",marginBottom:10,fontSize:13}}>All submitted.</div>
                  <button onClick={()=>D({type:"REVEAL"})} style={{...BTN,fontSize:14,padding:"10px 24px",fontWeight:"bold"}}>🚀 Reveal All</button>
                </div>
            )}
          </>:<>
            {shipResult&&<div style={{...P,border:`1px solid ${shipResult.allMet?"#14532d":"#7f1d1d"}`,marginBottom:10}}>
              <div style={{fontSize:13,fontWeight:"bold",color:shipResult.allMet?"#4ade80":"#f87171",marginBottom:6}}>{shipResult.allMet?"✓ Earth's demand met!":"✗ Demand not fully met"}</div>
              <div style={{display:"flex",gap:16,marginBottom:6}}>
                {[["Greens","g","#4ade80","mG"],["Grain","gr","#facc15","mGr"],["Exotics","ex","#c084fc","mEx"]].map(([lbl,k,col,mk])=><div key={k} style={{textAlign:"center"}}>
                  <div style={{fontSize:9,color:"#607890"}}>{lbl}</div>
                  <div style={{fontSize:16,fontWeight:"bold",color:shipResult[mk]?col:"#f87171"}}>{shipResult.tot[k]}/{shipResult.dem[k]}</div>
                </div>)}
              </div>
              <div style={{fontWeight:"bold",color:shipResult.vd>=0?"#4ade80":"#f87171",fontSize:13,textAlign:"center"}}>Vitality {shipResult.vd>=0?"+":""}{shipResult.vd} → {shipResult.newVit}</div>
            </div>}
            <div style={{display:"grid",gridTemplateColumns:`repeat(${Math.min(players.length,4)},1fr)`,gap:6,marginBottom:10}}>
              {contribs.map(c=>{const p=players.find(x=>x.id===c.id);return <div key={c.id} style={{...P,padding:8}}>
                <div style={{fontSize:10,fontWeight:"bold",color:"#607890",marginBottom:3}}>{p&&p.name}</div>
                <div style={{fontSize:9,color:"#4ade80"}}>→Earth: G{c.ship.g} Gr{c.ship.gr} Ex{c.ship.ex}</div>
                <div style={{fontSize:9,color:"#a855f7"}}>→Colony: G{c.invest.g} Gr{c.invest.gr} Ex{c.invest.ex}</div>
                {p&&<div style={{marginTop:4}}><ColonyDisplay player={p}/></div>}
              </div>;})}
            </div>
            <button onClick={()=>D({type:"END_ROUND"})} style={BTN}>→ End Round {round}</button>
          </>}
        </div>}

      </div>

      {/* Sidebar */}
      <div style={{width:isNarrow?"100%":300,flexShrink:0,display:"flex",flexDirection:"column",gap:14}}>
        <div style={P}>
          <div style={{...LBL,marginBottom:8}}>Sun Dial</div>
          <SDial pos={sunPos}/>
          <div style={{...LBL,margin:"14px 0 8px",paddingTop:12,borderTop:"1px solid #1e2d3d"}}>Demand Schedule</div>
          {DEMAND.slice(1).map((d,i)=><div key={i} style={{display:"flex",gap:10,fontSize:13,padding:"4px 0",borderBottom:i+1===round?"1px solid #134e4a":"none",color:i+1===round?"#f1f5f9":"#607890",fontWeight:i+1===round?"bold":"normal"}}>
            <span style={{width:24}}>R{i+1}</span>
            <span style={{color:"#4ade80"}}>G{d.g}</span>
            <span style={{color:"#facc15"}}>Gr{d.gr}</span>
            <span style={{color:"#c084fc"}}>Ex{d.ex}</span>
          </div>)}
        </div>
        <div style={P}>
          <div style={{...LBL,marginBottom:8}}>Players</div>
          {players.map((p,pi)=><div key={p.id} style={{marginBottom:10,paddingBottom:10,borderBottom:"1px solid #0d1526",display:"flex",gap:8,alignItems:"flex-start"}}>
            {pi===activeIdx&&<PixelShip size={5} still/>}
            <div style={{flex:1}}>
              <div style={{fontSize:13,color:"#c0ccdd",fontWeight:"bold",marginBottom:3}}>{p.name}{p.isAI?` 🤖${personalityOf(p.isAI)?.icon||""}`:""}</div>
              <span style={{color:"#4ade80",fontSize:12}}>G{p.stockpile.g} </span>
              <span style={{color:"#facc15",fontSize:12}}>Gr{p.stockpile.gr} </span>
              <span style={{color:"#c084fc",fontSize:12}}>Ex{p.stockpile.ex}</span>
              <div style={{fontSize:11,color:"#4b5563",marginTop:2}}>LS{p.colony.ls.filter(Boolean).length} AG{p.colony.ag.filter(Boolean).length} RE{p.colony.re.filter(Boolean).length} · 🏆×{p.roundWins||0}</div>
            </div>
          </div>)}
        </div>
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
